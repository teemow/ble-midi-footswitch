; PlatformIO project for the "three" BLE-MIDI footswitch (WEMOS LOLIN32 / ESP32).
;
; Platform pin rationale: NimBLE-Arduino 1.4.x (required by BLE-MIDI 2.2's NimBLE
; backend, which uses the NimBLE 1.x API) only builds against ESP-IDF 4.x /
; Arduino-ESP32 core 2.0.x. espressif32 6.9.0 ships exactly that. Do NOT bump to
; the pioarduino 5x.x platform (core 3.x / IDF 5.x) without first migrating
; BLE-MIDI to NimBLE 2.x.

[env:lolin32]
platform = espressif32@6.9.0
board = lolin32
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -D CORE_DEBUG_LEVEL=1
    ; WEMOS Matrix GFX defaults its data/clock pins to D7/D5 (ESP8266 aliases the
    ; ESP32 lolin32 variant does not define). Map them to this build's wiring:
    ; clock = GPIO18, data = GPIO23 (matches the original sketch's #defines).
    -D D5=18
    -D D7=23

; BLE-MIDI and NimBLE-Arduino (1.4.3) are vendored into lib/ (see lib/README.md).
; They are intentionally NOT in lib_deps: BLE-MIDI's registry package declares an
; unversioned NimBLE-Arduino dependency that PlatformIO cannot constrain, so it
; would pull NimBLE 2.x next to the 1.4.x the backend needs and fail to link.
; The vendored BLE-MIDI has its depends trimmed to "MIDI Library" only, so nothing
; ever installs NimBLE 2.x from the registry.
lib_deps =
    fortyseveneffects/MIDI Library@^5.0.2
    adafruit/Adafruit GFX Library@^1.12.0
    thomasfredericks/Wemos Matrix Adafruit GFX@^1.4
    tzapu/WiFiManager@^2.0.17

; Over-the-air upload: `pio run -e ota -t upload` once the device is on WiFi.
; The firmware advertises mDNS as `three.local` and the OTA port is password
; protected (see OTA_PASSWORD in src/main.cpp).
[env:ota]
extends = env:lolin32
upload_protocol = espota
upload_port = three.local
upload_flags =
    --auth=THR33!!!
    ; host_ip is needed because this dev host is multi-homed (WireGuard wg0 +
    ; docker0), so espota's auto-detect can hand the ESP32 an unreachable return
    ; address. Set this to THIS machine's IP on the device's LAN. Remove/adjust
    ; on a single-interface host.
    --host_ip=192.168.2.75
    ; Pin espota's return-channel TCP port so the host firewall can allow exactly
    ; this one port (see demiurg/system/etc/nftables.conf "espota return channel").
    --host_port=3233
